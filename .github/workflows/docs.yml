name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "logcore/**"
      - "README.md"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Required for actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy; don't cancel a running one (so the deploy that
# actually published always finishes cleanly).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,otel]"

      - name: Build site
        run: |
          sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
